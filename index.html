<title>Animation Trivia Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
#app{max-width:680px;margin:0 auto;padding:1rem}
h1{font-size:22px;font-weight:500;margin-bottom:1.25rem}
.tab-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:6px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#555;cursor:pointer;font-size:13px}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.mode-bar{display:flex;gap:6px;margin-bottom:1.25rem}
.mode-btn{padding:7px 20px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#555;cursor:pointer;font-size:13px}
.mode-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#f0efe8;border-radius:8px;padding:.75rem;text-align:center}
.stat-n{font-size:22px;font-weight:500}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.question{font-size:17px;font-weight:500;line-height:1.5;margin-bottom:1.25rem}
.options{display:grid;gap:8px}
.opt{padding:10px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;text-align:left;font-size:14px;line-height:1.4;font-family:system-ui,sans-serif}
.opt:hover:not(:disabled){background:#f5f5f0}
.opt.correct{background:#eaf3de;border-color:#639922;color:#27500a}
.opt.wrong{background:#fcebeb;border-color:#a32d2d;color:#791f1f}
.opt:disabled{cursor:default}
.feedback{font-size:13px;margin-top:.75rem;padding:.5rem .75rem;border-radius:8px}
.feedback.correct{background:#eaf3de;color:#3b6d11}
.feedback.wrong{background:#fcebeb;color:#a32d2d}
.next-btn{margin-top:1rem;padding:8px 22px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif}
.next-btn:hover{background:#f0efe8}
.score-card{text-align:center;padding:2rem}
.score-big{font-size:52px;font-weight:500}
.score-label{font-size:14px;color:#888;margin-top:.25rem}
.score-msg{font-size:15px;color:#555;margin-top:1rem}
.restart-btn{margin-top:1.5rem;padding:10px 28px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif}
.restart-btn:hover{background:#f0efe8}
.study-search{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;font-family:system-ui,sans-serif;margin-bottom:1rem}
.study-item{padding:.75rem 0;border-bottom:1px solid #f0efe8;display:flex;justify-content:space-between;align-items:baseline;gap:1rem}
.study-item:last-child{border-bottom:none}
.study-q{font-size:14px;color:#555;flex:1}
.study-a{font-size:14px;font-weight:500;color:#1a1a1a;text-align:right;flex:1}
</style>
</head>
<body>
<div id="app">

</div>

let cat='familyguy',mode='quiz',deck=[],idx=0,score=0,answered=false;
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function setCategory(c){
  cat=c;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+c).classList.add('active');
  mode==='quiz'?startQuiz():renderStudy();
}
function setMode(m){
  mode=m;
  document.getElementById('m-quiz').classList.toggle('active',m==='quiz');
  document.getElementById('m-study').classList.toggle('active',m==='study');
  m==='quiz'?startQuiz():renderStudy();
}
function startQuiz(){
  deck=shuffle(DATA[cat].items);idx=0;score=0;answered=false;renderQuiz();
}
function renderQuiz(){
  const main=document.getElementById('main');
  if(idx>=deck.length){
    const pct=Math.round(score/deck.length*100);
    const msg=pct>=90?'🏆 Animation master!':pct>=70?'👍 Solid effort!':pct>=50?'📺 Getting there!':'💪 More episodes needed!';
    main.innerHTML=`<div class="card score-card"><div class="score-big">${score}/${deck.length}</div><div class="score-label">${pct}% correct</div><div class="score-msg">${msg}</div><button class="restart-btn" onclick="startQuiz()">Try again</button></div>`;
    return;
  }
  const item=deck[idx];
  const opts=shuffle([item.a,...item.w.slice(0,3)]);
  answered=false;
  const safeOpts=opts.map((o,i)=>{
    const safe=o.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    return `<button class="opt" id="opt${i}" data-val="${safe}" onclick="choose(${i})">${o}</button>`;
  });
  main.innerHTML=`<div class="stats"><div class="stat"><div class="stat-n">${idx+1}/${deck.length}</div><div class="stat-l">question</div></div><div class="stat"><div class="stat-n">${score}</div><div class="stat-l">correct</div></div><div class="stat"><div class="stat-n">${idx>0?Math.round(score/idx*100):'-'}%</div><div class="stat-l">accuracy</div></div></div><div class="card"><div class="question">${item.q}</div><div class="options" id="opts">${safeOpts.join('')}</div><div id="feedback"></div></div>`;
}
function choose(i){
  if(answered)return;answered=true;
  const item=deck[idx];
  const btns=document.querySelectorAll('.opt');
  const chosen=btns[i].dataset.val;
  const correct=chosen===item.a;
  if(correct)score++;
  btns.forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===item.a)b.classList.add('correct');
    else if(b===btns[i]&&!correct)b.classList.add('wrong');
  });
  document.getElementById('feedback').innerHTML=correct
    ?`<div class="feedback correct">✓ Correct!</div><button class="next-btn" onclick="nextQ()">Next →</button>`
    :`<div class="feedback wrong">✗ Answer: ${item.a}</div><button class="next-btn" onclick="nextQ()">Next →</button>`;
}
function nextQ(){idx++;renderQuiz();}
function renderStudy(){
  const items=DATA[cat].items;
  document.getElementById('main').innerHTML=`<input class="study-search" id="srch" placeholder="Filter questions and answers..." oninput="filterStudy()"><div class="card" id="study-list">${items.map(it=>`<div class="study-item" data-q="${it.q.toLowerCase().replace(/"/g,'&quot;')}" data-a="${it.a.toLowerCase().replace(/"/g,'&quot;')}"><span class="study-q">${it.q}</span><span class="study-a">${it.a}</span></div>`).join('')}</div>`;
}
function filterStudy(){
  const q=document.getElementById('srch').value.toLowerCase();
  document.querySelectorAll('.study-item').forEach(el=>{el.style.display=(el.dataset.q.includes(q)||el.dataset.a.includes(q))?'':'none';});
}
const tabBar=document.getElementById('tabs');
Object.entries(DATA).forEach(([key,val])=>{
  const b=document.createElement('button');
  b.className='tab'+(key===cat?' active':'');
  b.id='tab-'+key;b.textContent=val.label;
  b.onclick=()=>setCategory(key);
  tabBar.appendChild(b);
});
startQuiz();
</script>
</body>
</html>
